<div class="container py-3">

  <!-- ALERT -->
  <div *ngIf="alertMessage"
       class="alert"
       [ngClass]="{
         'alert-success': alertType === 'success',
         'alert-danger': alertType === 'error'
       }">
    {{ alertMessage }}
  </div>

  <!-- HEADER -->
  <div class="d-flex justify-content-between align-items-center mb-3">

    <div class="d-flex flex-column">
      <h5 class="mb-5 text-muted">
        Welcome, {{ user?.name || 'User' }}
      </h5>
      <h1>List Spare Parts</h1>
    </div>

  </div>

  <!-- FORM -->
  <div class="card mb-4 shadow-sm">
    <div class="card-body">

      <form (ngSubmit)="submit()">

        <div class="row g-3">

          <div class="col-md-4">
            <input class="form-control" placeholder="Item Code"
              [(ngModel)]="formData.itemCode" name="itemCode">
          </div>

          <div class="col-md-4">
            <input class="form-control" placeholder="Description"
              [(ngModel)]="formData.description" name="description">
          </div>

          <div class="col-md-4">
            <input class="form-control" placeholder="Part"
              [(ngModel)]="formData.part" name="part">
          </div>

          <div class="col-md-4">
            <input class="form-control" placeholder="Quantity"
              [(ngModel)]="formData.quantity" name="quantity">
          </div>

          <div class="col-md-4">
            <input class="form-control" placeholder="Price"
              [(ngModel)]="formData.price" name="price">
          </div>

          <div class="col-md-4">
            <input type="file" class="form-control"
              (change)="onFileChange($event)">
          </div>

        </div>

        <div class="mt-3">
          <button class="btn btn-primary">
            {{ isEdit ? 'Update' : 'Create' }}
          </button>
        </div>

      </form>

    </div>
  </div>

  <!-- LIST -->
  <div class="card shadow-sm">
    <div class="card-header bg-dark text-white">
      Parts List
    </div>

    <div class="container py-3">
      <div class="row">

        <div class="col-md-4 mb-3" *ngFor="let p of parts">
          <div class="card h-100 shadow-sm">

            <div class="card-body">
              <h6>{{ p.itemCode }}</h6>

              <p><b>Description:</b> {{ p.description }}</p>
              <p><b>Part:</b> {{ p.part }}</p>
              <p><b>Qty:</b> {{ p.quantity }}</p>
              <p><b>Price:</b> ₱{{ p.price }}</p>

              <img *ngIf="p.image"
                [src]="p.image"
                class="img-fluid mb-2"
                style="max-height: 80px">

              <div class="d-flex gap-2">
                <button class="btn btn-warning btn-sm flex-fill"
                  (click)="edit(p)">
                  Edit
                </button>

                <button class="btn btn-danger btn-sm flex-fill"
                  (click)="delete(p.id)">
                  Delete
                </button>
              </div>

            </div>

          </div>
        </div>

      </div>
    </div>
  </div>

</div>
