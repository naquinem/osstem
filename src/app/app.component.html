<!-- NAVBAR -->
<nav
  *ngIf="user"
  class="navbar navbar-expand-lg navbar-dark shadow-sm">

  <div class="container-fluid">

    <!-- BRAND -->
    <a class="navbar-brand d-flex flex-column align-items-center ms-3" routerLink="/">
      <span class="osstem">OSSTEM</span>
      <span class="implant">PHILIPPINES</span>
    </a>

    <!-- TOGGLER -->
    <button class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#nav">

      <span class="navbar-toggler-icon"></span>

    </button>

    <!-- MENU -->
    <div class="collapse navbar-collapse" id="nav">

      <ul class="navbar-nav ms-auto">

        <!-- USER MENU -->
        <ng-container *ngIf="user.role === 'user'">

          <li class="nav-item">
            <a class="nav-link" routerLink="/dashboard">
              Parts
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" routerLink="/history">
              My Requests
            </a>
          </li>

        </ng-container>

        <!-- ADMIN MENU -->
        <ng-container *ngIf="user.role === 'admin'">

          <li class="nav-item">
            <a class="nav-link" routerLink="/component">
              Manage Parts
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" routerLink="/register">
              Register User
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/withdrawal-history">
              User Withdrawal History
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/withdrawals">
              Pending Requests
            </a>
          </li>

        </ng-container>

        <!-- LOGOUT -->
        <li class="nav-item ms-2">

          <button class="btn btn-light btn-sm"
            (click)="logout()">

            Logout

          </button>

        </li>

      </ul>

    </div>

  </div>

</nav>

<!-- PAGE WRAPPER -->
<div class="container-fluid py-3">

  <div class="row justify-content-center">

    <div class="col-12 col-xl-10">

      <div class="card shadow-sm border-0">

        <div class="card-body">

          <router-outlet></router-outlet>

        </div>

      </div>

    </div>

  </div>

</div>
